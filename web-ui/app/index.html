<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Forged Circuit</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="header">
    <img src="assets/logo.png" class="logo">
    <div class="title">Forged Circuit</div>
    <div class="subtitle">Home Network Protection</div>
  </div>

  <div class="grid">

    <div class="card">
      <h3>Threats Blocked</h3>
      <div id="blocked">--</div>
    </div>

    <div class="card">
      <h3>DNS Queries</h3>
      <div id="queries">--</div>
    </div>

    <div class="card">
      <h3>Protected Devices</h3>
      <div id="devices">--</div>
    </div>

    <div class="card">
      <h3>Internet Status</h3>
      <div id="internet">--</div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
